<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wiki — Sustainability Tracker</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script src="js/theme-init.js"></script>
  </head>
  <body class="no-map">
    <header>
      <section class="header-left">
        <a href="index.html" class="back-btn">← Back</a>
      </section>
      <section class="header-center">
        <span id="wiki-title">Wiki</span>
      </section>
      <section class="header-right">
        <button id="about-btn">About</button>
        <button id="account-btn">Account</button>
      </section>
    </header>
    <main class="discover-page">
      <div class="discover-search-wrap">
        <input id="wiki-search" class="discover-search" type="search" placeholder="Search by name, species, or status…" />
      </div>
      <div id="wiki-status-bar" class="wiki-status-bar">
        <div id="wiki-chips-area" class="wiki-chips-area"></div>
        <button id="wiki-favorites-toggle" class="wiki-fav-toggle" aria-pressed="false">&#9734; Favorites</button>
        <button id="wiki-clear-filters" class="wiki-clear-btn" hidden>Clear</button>
        <button id="wiki-surprise-btn" class="wiki-surprise-btn" title="Open a random species">&#127922; Surprise me</button>
        <div class="wiki-sort-group">
          <span class="wiki-filter-label">Sort</span>
          <select id="wiki-sort" class="wiki-sort-select">
            <option value="default">Default</option>
            <option value="name-asc">Name A→Z</option>
            <option value="health-asc">Health % ↑</option>
            <option value="health-desc">Health % ↓</option>
            <option value="threat-desc">Threat Severity</option>
            <option value="recently-viewed">Recently Viewed</option>
          </select>
        </div>
      </div>
      <div class="wiki-threat-legend" aria-label="Threat severity legend">
        <span class="wiki-threat-legend-label">Threat severity</span>
        <span class="tab-severity-badge tab-severity-badge--critical">Critical</span>
        <span class="tab-severity-badge tab-severity-badge--high">High</span>
        <span class="tab-severity-badge tab-severity-badge--medium">Medium</span>
        <span class="tab-severity-badge tab-severity-badge--low">Low</span>
      </div>
      <div id="wiki-grid" class="wiki-grid"></div>
    </main>
    <div id="account-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>My Account</h2>
          <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="account-field">
            <span class="field-label">Username</span>
            <span id="account-username"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Email</span>
            <span id="account-email"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Password</span>
            <span id="account-password">••••••••</span>
          </div>
          <div class="account-field">
            <span class="field-label">Favorite Projects</span>
            <ul id="account-projects"></ul>
          </div>
        </div>
      </div>
    </div>
    <div id="species-modal" class="modal-overlay hidden">
      <div class="modal species-modal">
        <div id="species-modal-image" class="species-modal-image">
          <span id="species-modal-emoji" class="species-modal-emoji"></span>
        </div>
        <div class="species-modal-sticky">
          <div class="modal-header">
            <div>
              <div id="species-modal-name" class="species-modal-name"></div>
              <div id="species-modal-sci" class="species-modal-sci"></div>
            </div>
            <div class="modal-header-actions">
              <button id="modal-star-btn" class="modal-nav-btn modal-star-btn" aria-label="Favorite species">&#9734;</button>
              <button id="modal-prev" class="modal-nav-btn" aria-label="Previous species">&#8249;</button>
              <span id="modal-counter" class="modal-nav-counter"></span>
              <button id="modal-next" class="modal-nav-btn" aria-label="Next species">&#8250;</button>
              <button id="species-modal-close" class="close-btn">&times;</button>
            </div>
          </div>
          <div class="species-modal-hero">
            <div class="species-life-wrap">
              <div class="species-life-bar">
                <div id="species-modal-fill" class="species-life-fill"></div>
              </div>
              <div id="species-modal-status" class="species-life-label"></div>
            </div>
          </div>
          <div class="species-tabs" role="tablist">
            <button class="species-tab active" data-tab="overview" id="tab-btn-overview">Overview</button>
            <button class="species-tab"        data-tab="vital"    id="tab-btn-vital">Vital Signs</button>
            <button class="species-tab"        data-tab="health"   id="tab-btn-health">Health Metrics</button>
            <button class="species-tab"        data-tab="threats"  id="tab-btn-threats">Threats</button>
            <button class="species-tab"        data-tab="actions"  id="tab-btn-actions">Action Items</button>
          </div>
        </div><!-- /.species-modal-sticky -->
        <div class="species-tab-panels">
          <div class="species-tab-panel active" id="tab-panel-overview"></div>
          <div class="species-tab-panel"        id="tab-panel-vital"></div>
          <div class="species-tab-panel"        id="tab-panel-health"></div>
          <div class="species-tab-panel"        id="tab-panel-threats"></div>
          <div class="species-tab-panel"        id="tab-panel-actions"></div>
        </div>
      </div>
    </div>
    <script src="js/shared.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var projectId = params.get("project");

        if (!projectId) {
          var activeName = localStorage.getItem("activeProject");
          if (activeName && typeof PROJECT_CATALOG !== "undefined") {
            var found = PROJECT_CATALOG.find(function (p) { return p.name === activeName; });
            if (found) projectId = found.id;
          }
        }

        if (!projectId) {
          document.getElementById("wiki-title").textContent = "Wiki";
          document.getElementById("wiki-grid").innerHTML =
            '<p class="discover-empty">No project selected. Return to <a href="index.html">home</a>.</p>';
          return;
        }

        var dataScript = document.createElement("script");
        dataScript.src = "projects/" + projectId + "/data.js";
        dataScript.onerror = function () {
          document.getElementById("wiki-title").textContent = "Wiki";
          document.getElementById("wiki-grid").innerHTML =
            '<p class="discover-empty">No wiki found for this project.</p>';
        };
        dataScript.onload = function () {
          var wikiScript = document.createElement("script");
          wikiScript.src = "js/wiki.js";
          document.body.appendChild(wikiScript);
        };
        document.body.appendChild(dataScript);
      })();
    </script>
  </body>
</html>
