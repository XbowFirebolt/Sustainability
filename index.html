<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sustainability Tracker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <section class="header-left">
        <button>Donate</button>
      </section>
      <section class="header-center">
        <span>Hang in there!</span>
      </section>
      <section class="header-right">
        <button id="account-btn">Account</button>
      </section>
    </header>
    <main>
      <h1>Sustainability Tracker</h1>
    </main>
    <div id="account-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>My Account</h2>
          <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="account-field">
            <span class="field-label">Username</span>
            <span id="account-username"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Email</span>
            <span id="account-email"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Password</span>
            <span id="account-password">••••••••</span>
          </div>
          <div class="account-field">
            <span class="field-label">Favorite Projects</span>
            <ul id="account-projects"></ul>
          </div>
        </div>
      </div>
    </div>
    <nav id="project-dock" class="dock" aria-label="Favorite projects">
      <div class="dock-track" id="dock-track"></div>
    </nav>
    <script src="app.js"></script>
  </body>
</html>
