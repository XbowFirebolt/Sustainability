<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shark Species — Sustainability Tracker</title>
    <link rel="stylesheet" href="../../css/styles.css" />
    <script src="../../js/theme-init.js"></script>
  </head>
  <body class="no-map">
    <header>
      <section class="header-left">
        <a href="../../index.html" class="back-btn">← Back</a>
      </section>
      <section class="header-center">
        <span>Shark Species</span>
      </section>
      <section class="header-right">
        <button id="about-btn">About</button>
        <button id="account-btn">Account</button>
      </section>
    </header>
    <main class="discover-page">
      <div class="discover-search-wrap">
        <input id="wiki-search" class="discover-search" type="search" placeholder="Search by name, species, or status…" />
      </div>
      <div id="wiki-grid" class="wiki-grid"></div>
    </main>
    <div id="account-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>My Account</h2>
          <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="account-field">
            <span class="field-label">Username</span>
            <span id="account-username"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Email</span>
            <span id="account-email"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Password</span>
            <span id="account-password">••••••••</span>
          </div>
          <div class="account-field">
            <span class="field-label">Favorite Projects</span>
            <ul id="account-projects"></ul>
          </div>
        </div>
      </div>
    </div>
    <div id="species-modal" class="modal-overlay hidden">
      <div class="modal species-modal">
        <div id="species-modal-image" class="species-modal-image">
          <span id="species-modal-emoji" class="species-modal-emoji">🦈</span>
        </div>
        <div class="modal-header">
          <div>
            <div id="species-modal-name" class="species-modal-name"></div>
            <div id="species-modal-sci" class="species-modal-sci"></div>
          </div>
          <button id="species-modal-close" class="close-btn">&times;</button>
        </div>
        <div class="modal-body species-modal-body">
          <div class="species-life-wrap">
            <div class="species-life-bar">
              <div id="species-modal-fill" class="species-life-fill"></div>
            </div>
            <div id="species-modal-status" class="species-life-label"></div>
          </div>
          <div class="species-modal-section">
            <div class="funfact-label">About</div>
            <div id="species-modal-desc" class="funfact-text"></div>
          </div>
          <div class="species-modal-stats">
            <div class="species-modal-stat">
              <div class="funfact-label">Habitat</div>
              <div id="species-modal-habitat" class="funfact-text"></div>
            </div>
            <div class="species-modal-stat">
              <div class="funfact-label">Diet</div>
              <div id="species-modal-diet" class="funfact-text"></div>
            </div>
            <div class="species-modal-stat">
              <div class="funfact-label">Max Size</div>
              <div id="species-modal-size" class="funfact-text"></div>
            </div>
          </div>
          <div class="species-modal-section">
            <div class="funfact-label">Primary Threats</div>
            <div id="species-modal-threats" class="funfact-text"></div>
          </div>
          <div class="species-modal-section">
            <div class="funfact-label">Fun Fact</div>
            <div id="species-modal-funfact" class="funfact-text"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="../../js/shared.js"></script>
    <script src="./wiki.js"></script>
  </body>
</html>
