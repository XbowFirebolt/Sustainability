<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Discover Projects — Sustainability Tracker</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="theme-init.js"></script>
  </head>
  <body class="no-map">
    <header>
      <section class="header-left">
        <a href="index.html" class="back-btn">← Back</a>
      </section>
      <section class="header-center">
        <span>Discover Projects</span>
      </section>
      <section class="header-right">
        <button id="about-btn">About</button>
        <button id="account-btn">Account</button>
      </section>
    </header>
    <main class="discover-page">
      <div class="discover-search-wrap">
        <input id="discover-search" class="discover-search" type="search" placeholder="Search projects…" />
      </div>
      <div id="discover-grid" class="discover-grid"></div>
    </main>
    <div id="account-modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2>My Account</h2>
          <button id="close-modal" class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="account-field">
            <span class="field-label">Username</span>
            <span id="account-username"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Email</span>
            <span id="account-email"></span>
          </div>
          <div class="account-field">
            <span class="field-label">Password</span>
            <span id="account-password">••••••••</span>
          </div>
          <div class="account-field">
            <span class="field-label">Favorite Projects</span>
            <ul id="account-projects"></ul>
          </div>
        </div>
      </div>
    </div>
    <script src="shared.js"></script>
    <script src="discover.js"></script>
  </body>
</html>
